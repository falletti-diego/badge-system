[build]
base = "frontend-web"
publish = "dist"
command = "npm run build"

# API proxy: Netlify forwards /api/* → EC2 backend
# Avoids HTTPS→HTTP mixed content (Netlify handles the bridge)
# MUST come before the SPA catch-all below
[[redirects]]
from = "/api/*"
to = "https://api.dataxiom.it/api/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/*"
[headers.values]
"Cache-Control" = "max-age=0,no-cache,no-store,must-revalidate"

[[headers]]
for = "/assets/*"
[headers.values]
"Cache-Control" = "max-age=31536000,immutable"
