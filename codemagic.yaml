workflows:
  badge-ios-testflight:
    name: Badge System iOS — TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: it.dataxiom.badge
        # API key name must match the one configured in:
        # Codemagic → Team → Integrations → App Store Connect API Keys
        api_key: Badge Production
      node: v20.x
      xcode: latest
      cocoapods: default
    working_directory: frontend-mobile
    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Generate native iOS project
        script: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          # Workspace name is set by expo prebuild from app.json "name" field.
          # For "Badge System" this generates "Badge System.xcworkspace".
          # If build fails here, run locally: cd frontend-mobile && npx expo prebuild --platform ios --clean && ls ios/*.xcworkspace
          xcode-project build-ipa \
            --workspace "ios/Badge System.xcworkspace" \
            --scheme "Badge System"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - App Store Connect Users
