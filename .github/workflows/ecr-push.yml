name: Build & Push Backend to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/ecr-push.yml'
  workflow_dispatch: {}

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: 125579685235.dkr.ecr.eu-west-1.amazonaws.com
  ECR_REPOSITORY: badge-system-backend

jobs:
  lint-and-test:
    name: Lint & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run linter
        working-directory: ./backend
        run: npm run lint

      - name: Run tests
        working-directory: ./backend
        # `npm test` runs validate-env (a separate process, before jest) which
        # requires these vars in process.env. The DB is mocked in tests, so
        # connection values are placeholders; jest.setup.js generates real RSA
        # keys at runtime, overriding the JWT placeholders below.
        env:
          NODE_ENV: test
          PORT: '3000'
          LOG_LEVEL: silent
          APP_NAME: badge-system-test
          DATABASE_URL: postgres://test:test@localhost:5432/test
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: test
          JWT_PRIVATE_KEY: ci-placeholder-overridden-by-jest-setup
          JWT_PUBLIC_KEY: ci-placeholder-overridden-by-jest-setup
          CORS_ORIGIN: http://localhost:5173
          DISABLE_AUTH: 'true'
          SEED_TEST_DATA: 'false'
        run: npm test -- --coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: backend/coverage

  build-and-push:
    name: Build & Push Docker Image to ECR
    needs: lint-and-test
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        working-directory: ./backend
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA} .

      - name: Push Docker image to ECR
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}

      - name: Log image URIs
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "✅ Docker Image Published to ECR:"
          echo "  Repository: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}"
          echo "  Latest tag: latest"
          echo "  Commit tag: ${SHORT_SHA}"
          echo ""
          echo "Pull commands:"
          echo "  docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
          echo "  docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}"

      - name: Logout from Amazon ECR
        if: always()
        run: docker logout ${{ steps.login-ecr.outputs.registry }}
