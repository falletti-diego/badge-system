name: Deploy to EC2

on:
  workflow_run:
    workflows: ['Build & Push Backend to ECR']
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: 125579685235.dkr.ecr.eu-west-1.amazonaws.com
  ECR_REPOSITORY: badge-system-backend
  CONTAINER_NAME: badge-system-api
  CONTAINER_PORT: 3000

jobs:
  deploy:
    name: Deploy to EC2 Production
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy deploy scripts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "scripts/wait-healthy.sh"
          target: "/tmp"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "========================================="
            echo "🚀 Deploying Badge System Backend to EC2"
            echo "========================================="

            # Configure AWS credentials
            aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws configure set region ${{ env.AWS_REGION }}
            echo "✅ AWS credentials configured"

            echo ""
            echo "📦 Step 1: Login to AWS ECR..."
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            echo "✅ ECR login successful"

            echo ""
            echo "🐋 Step 2: Pull latest Docker image from ECR..."
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            echo "✅ Image pulled successfully"

            echo ""
            echo "🛑 Step 3: Stop and remove ALL containers on port ${{ env.CONTAINER_PORT }}..."

            # Stop the target container by name
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            # Stop ANY other container occupying port 3000 (covers renamed/legacy containers)
            OTHERS=$(docker ps -q --filter "publish=${{ env.CONTAINER_PORT }}" 2>/dev/null)
            if [ -n "$OTHERS" ]; then
              echo "Stopping other containers on port ${{ env.CONTAINER_PORT }}: $OTHERS"
              docker stop $OTHERS
              docker rm $OTHERS 2>/dev/null || true
            fi

            # Kill lingering docker-proxy processes on the port directly (no daemon restart)
            sudo fuser -k ${{ env.CONTAINER_PORT }}/tcp 2>/dev/null || true
            sleep 2

            # Confirm port is free before proceeding
            if sudo lsof -i :${{ env.CONTAINER_PORT }} 2>/dev/null | grep LISTEN; then
              echo "⚠️  Port ${{ env.CONTAINER_PORT }} still in use — waiting 3s more..."
              sleep 3
            fi

            echo "✅ Old containers removed, port ${{ env.CONTAINER_PORT }} cleared"

            echo ""
            echo "🚀 Step 4: Run new container..."
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.CONTAINER_PORT }}:${{ env.CONTAINER_PORT }} \
              -e NODE_ENV=production \
              -e LOG_LEVEL=info \
              -e PORT=${{ env.CONTAINER_PORT }} \
              -e DB_HOST=badge-system-db.cvs80y0my080.eu-west-1.rds.amazonaws.com \
              -e DB_PORT=5432 \
              -e DB_USER=postgres \
              -e DB_PASSWORD='${{ secrets.RDS_PASSWORD }}' \
              -e DB_NAME=badge_system \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e JWT_REFRESH_SECRET='${{ secrets.JWT_REFRESH_SECRET }}' \
              -e JWT_EXPIRY=30m \
              -e JWT_REFRESH_EXPIRY=7d \
              -e CORS_ORIGIN="https://dataxiom-badge.netlify.app,http://localhost:5173" \
              -e CORS_CREDENTIALS="true" \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

            CONTAINER_ID=$(docker ps -q -f name=${{ env.CONTAINER_NAME }})
            echo "✅ Container running: ${CONTAINER_ID}"

            echo ""
            echo "⏳ Step 5: Wait for container to become healthy..."
            chmod +x /tmp/wait-healthy.sh
            bash /tmp/wait-healthy.sh ${{ env.CONTAINER_NAME }} \
              --port ${{ env.CONTAINER_PORT }} \
              --timeout 120

            echo ""
            echo "======================================"
            echo "🎉 Deployment Complete!"
            echo "======================================"
            echo ""
            echo "Container Details:"
            echo "  Name: ${{ env.CONTAINER_NAME }}"
            echo "  Port: ${{ env.CONTAINER_PORT }}"
            echo "  Image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
            echo ""
            echo "Production URLs:"
            echo "  API: http://${{ secrets.EC2_HOST }}:${{ env.CONTAINER_PORT }}/api"
            echo "  Health: http://${{ secrets.EC2_HOST }}:${{ env.CONTAINER_PORT }}/health"
            echo ""

      - name: Deployment Status
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Backend is now running on http://${{ secrets.EC2_HOST }}:3000"
          echo ""
          echo "View logs:"
          echo "  ssh -i YOUR_KEY.pem ubuntu@${{ secrets.EC2_HOST }}"
          echo "  docker logs -f badge-system-api"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "SSH to EC2 and check logs:"
          echo "  docker logs badge-system-api"
          exit 1
