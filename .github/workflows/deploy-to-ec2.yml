name: Deploy to EC2

on:
  workflow_run:
    workflows: ['Build & Push Backend to ECR']
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: 125579685235.dkr.ecr.eu-west-1.amazonaws.com
  ECR_REPOSITORY: badge-system-backend
  CONTAINER_NAME: badge-system-api
  CONTAINER_PORT: 3000

jobs:
  deploy:
    name: Deploy to EC2 Production
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "========================================="
            echo "🚀 Deploying Badge System Backend to EC2"
            echo "========================================="

            # Configure AWS credentials
            aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws configure set region ${{ env.AWS_REGION }}
            echo "✅ AWS credentials configured"

            echo ""
            echo "📦 Step 1: Login to AWS ECR..."
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            echo "✅ ECR login successful"

            echo ""
            echo "🐋 Step 2: Pull latest Docker image from ECR..."
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            echo "✅ Image pulled successfully"

            echo ""
            echo "🛑 Step 3: Stop and remove existing container..."
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            sleep 1
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            sleep 1

            # Aggressive cleanup: networks, sockets, AND docker daemon restart
            echo "Cleaning up Docker networks and residual sockets..."
            docker network prune -f 2>/dev/null || true
            docker container prune -f 2>/dev/null || true

            # Kill any remaining processes on port 3000
            echo "Checking for any remaining processes on port 3000..."
            sudo lsof -i :${{ env.CONTAINER_PORT }} 2>/dev/null || echo "No processes found"

            # Last resort: restart Docker daemon to clear all iptables rules
            echo "Restarting Docker daemon to clear iptables state..."
            sudo systemctl restart docker 2>/dev/null || sudo /etc/init.d/docker restart 2>/dev/null || true
            sleep 5

            echo "✅ Old container removed, port cleaned, docker restarted"

            echo ""
            echo "🚀 Step 4: Run new container..."
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p ${{ env.CONTAINER_PORT }}:${{ env.CONTAINER_PORT }} \
              -e NODE_ENV=production \
              -e LOG_LEVEL=info \
              -e PORT=${{ env.CONTAINER_PORT }} \
              -e DB_HOST=badge-system-db.cvs80y0my080.eu-west-1.rds.amazonaws.com \
              -e DB_PORT=5432 \
              -e DB_USER=postgres \
              -e DB_PASSWORD='${{ secrets.RDS_PASSWORD }}' \
              -e DB_NAME=badge_system \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e JWT_REFRESH_SECRET='${{ secrets.JWT_REFRESH_SECRET }}' \
              -e JWT_EXPIRY=30m \
              -e JWT_REFRESH_EXPIRY=7d \
              -e CORS_ORIGIN="http://${{ secrets.EC2_HOST }}:3000" \
              -e CORS_CREDENTIALS="false" \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

            CONTAINER_ID=$(docker ps -q -f name=${{ env.CONTAINER_NAME }})
            echo "✅ Container running: ${CONTAINER_ID}"

            echo ""
            echo "⏳ Step 5: Wait for container to initialize (20s for RDS cold start)..."
            sleep 20

            echo ""
            echo "🏥 Step 6: Test health endpoint with retry loop..."
            MAX_HEALTH_ATTEMPTS=10
            HEALTH_OK=false
            for attempt in $(seq 1 $MAX_HEALTH_ATTEMPTS); do
              echo "Health check attempt $attempt/$MAX_HEALTH_ATTEMPTS..."
              HEALTH_RESPONSE=$(curl -s http://localhost:${{ env.CONTAINER_PORT }}/health || echo '{}')
              echo "Response: ${HEALTH_RESPONSE}"

              if echo "${HEALTH_RESPONSE}" | grep -q '"status":"ok"'; then
                echo "✅ Health endpoint working!"
                HEALTH_OK=true
                break
              fi

              if [ $attempt -lt $MAX_HEALTH_ATTEMPTS ]; then
                echo "⏳ Health check failed, waiting 5s before retry..."
                sleep 5
              fi
            done

            if [ "$HEALTH_OK" = false ]; then
              echo "⚠️  Health endpoint not responding after $MAX_HEALTH_ATTEMPTS attempts"
              echo "Checking container status..."
              docker ps -a | grep ${{ env.CONTAINER_NAME }}
              echo "Recent logs:"
              docker logs --tail 50 ${{ env.CONTAINER_NAME }}
            fi

            echo ""
            echo "======================================"
            echo "🎉 Deployment Complete!"
            echo "======================================"
            echo ""
            echo "Container Details:"
            echo "  Name: ${{ env.CONTAINER_NAME }}"
            echo "  Port: ${{ env.CONTAINER_PORT }}"
            echo "  Image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest"
            echo ""
            echo "Production URLs:"
            echo "  API: http://${{ secrets.EC2_HOST }}:${{ env.CONTAINER_PORT }}/api"
            echo "  Health: http://${{ secrets.EC2_HOST }}:${{ env.CONTAINER_PORT }}/health"
            echo ""

      - name: Deployment Status
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Backend is now running on http://${{ secrets.EC2_HOST }}:3000"
          echo ""
          echo "View logs:"
          echo "  ssh -i YOUR_KEY.pem ubuntu@${{ secrets.EC2_HOST }}"
          echo "  docker logs -f badge-system-api"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "SSH to EC2 and check logs:"
          echo "  docker logs badge-system-api"
          exit 1
