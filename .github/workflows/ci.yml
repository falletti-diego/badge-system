name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      # Backend
      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Lint backend
        run: cd backend && npm run lint --if-present

      - name: Test backend
        run: cd backend && npm test --if-present

      # Web Dashboard
      - name: Install web-dashboard dependencies
        run: cd web-dashboard && npm install

      - name: Lint web-dashboard
        run: cd web-dashboard && npm run lint --if-present

      - name: Build web-dashboard
        run: cd web-dashboard && npm run build --if-present

      # Mobile
      - name: Install mobile dependencies
        run: cd mobile && npm install

      - name: Lint mobile
        run: cd mobile && npm run lint --if-present

  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run security audit
        run: npm audit --audit-level=moderate --workspaces
        continue-on-error: true
