name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run on'
        required: false
        default: 'feat/backend-infrastructure'

jobs:
  backend:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - Show app.js line 64
        run: sed -n '62,66p' backend/src/app.js

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Lint backend
        working-directory: ./backend
        run: npm run lint

      - name: Run backend tests
        working-directory: ./backend
        run: npm test -- --coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage

  security-check:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: npm audit (fail on high/critical)
        working-directory: ./backend
        run: npm audit --audit-level=high

      - name: detect-secrets scan
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install detect-secrets
      - name: Scan for hardcoded secrets
        run: |
          detect-secrets scan \
            --exclude-files 'package-lock\.json' \
            --exclude-files '\.git/.*' \
            --exclude-files 'frontend-mobile/node_modules/.*' \
            --exclude-files 'frontend-web/node_modules/.*' \
            --baseline /dev/null \
            > /tmp/secrets-scan.json
          COUNT=$(python3 -c "import json,sys; d=json.load(open('/tmp/secrets-scan.json')); print(sum(len(v) for v in d.get('results',{}).values()))")
          if [ "$COUNT" -gt 0 ]; then
            echo "❌ detect-secrets found $COUNT potential secret(s):"
            cat /tmp/secrets-scan.json
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"
