name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run on'
        required: false
        default: 'feat/backend-infrastructure'

jobs:
  backend:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - Show app.js line 64
        run: sed -n '62,66p' backend/src/app.js

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Lint backend
        working-directory: ./backend
        run: npm run lint

      - name: Run backend tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          PORT: '3000'
          LOG_LEVEL: silent
          APP_NAME: badge-system-test
          DATABASE_URL: postgres://test:test@localhost:5432/test  # pragma: allowlist secret
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: test
          DB_PASSWORD: test  # pragma: allowlist secret
          DB_NAME: test
          JWT_PRIVATE_KEY: ci-placeholder-overridden-by-jest-setup
          JWT_PUBLIC_KEY: ci-placeholder-overridden-by-jest-setup
          CORS_ORIGIN: http://localhost:5173
          DISABLE_AUTH: 'true'
          SEED_TEST_DATA: 'false'
        run: npm test -- --coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage

  security-check:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: npm audit (fail on high/critical)
        working-directory: ./backend
        run: npm audit --audit-level=high

      - name: Setup Python for detect-secrets
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan for hardcoded secrets (detect-secrets)
        run: |
          pip install detect-secrets --quiet
          # Scan for real secrets: high-entropy strings, private keys, AWS keys.
          # KeywordDetector disabled: demo account passwords (pippo01 etc.) are
          # intentional placeholders replaced by bcrypt+DB in the Auth0 migration.
          detect-secrets scan \
            --disable-plugin KeywordDetector \
            --disable-plugin Base64HighEntropyString \
            --exclude-files 'package-lock\.json' \
            --exclude-files '\.git/.*' \
            --exclude-files 'frontend-mobile/node_modules/.*' \
            --exclude-files 'frontend-web/node_modules/.*' \
            --exclude-files 'badge-system/.*' \
            --exclude-files 'backend/\.env\.example' \
            --exclude-files 'backend/scripts/generate-prod-env\.sh' \
            --exclude-files 'docs/.*' \
            --exclude-files 'infrastructure/.*' \
            > /tmp/secrets-scan.json
          COUNT=$(python3 -c "import json; d=json.load(open('/tmp/secrets-scan.json')); print(sum(len(v) for v in d.get('results',{}).values()))")
          if [ "$COUNT" -gt 0 ]; then
            echo "❌ detect-secrets found $COUNT potential secret(s):"
            cat /tmp/secrets-scan.json
            exit 1
          fi
          echo "✅ No hardcoded secrets detected ($COUNT findings)"
