name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run on'
        required: false
        default: 'feat/backend-infrastructure'

jobs:
  backend:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    # Fail fast if jest ever hangs at exit again instead of burning the 6h runner limit
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: badge_system_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - Show app.js line 64
        run: sed -n '62,66p' backend/src/app.js

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Lint backend
        working-directory: ./backend
        run: npm run lint

      - name: Bootstrap base database schema (uuid-ossp + base tables)
        working-directory: ./backend
        env:
          PGPASSWORD: postgres  # pragma: allowlist secret
        # schema.sql is written to be run manually via `psql -f` against a fresh
        # cluster (it opens with DROP DATABASE/CREATE DATABASE/\c badge_system).
        # The postgres:14 service container already created badge_system_test for
        # us via POSTGRES_DB, so we strip that header — everything up to and
        # including the "-- BOOTSTRAP:BEGIN" marker line in schema.sql — and
        # apply the rest (CREATE EXTENSION "uuid-ossp" + all CREATE TABLE/seed
        # statements) directly against it. See run-migrations.js step below:
        # none of the migrations in backend/migrations/ create clients/sites/
        # employees/checkins/audit_log — only schema.sql does — so this step
        # must run first.
        run: |
          grep -q -- '-- BOOTSTRAP:BEGIN' src/db/schema.sql || { echo '::error::BOOTSTRAP:BEGIN marker missing from src/db/schema.sql'; exit 1; }
          sed '1,/^-- BOOTSTRAP:BEGIN/d' src/db/schema.sql | psql -v ON_ERROR_STOP=1 -h localhost -p 5432 -U postgres -d badge_system_test -f -

      - name: Apply database migrations
        working-directory: ./backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/badge_system_test  # pragma: allowlist secret
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: postgres
          DB_PASSWORD: postgres  # pragma: allowlist secret
          DB_NAME: badge_system_test
        run: node scripts/run-migrations.js

      - name: Run backend tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          PORT: '3000'
          LOG_LEVEL: silent
          APP_NAME: badge-system-test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/badge_system_test  # pragma: allowlist secret
          DB_HOST: localhost
          DB_PORT: '5432'
          DB_USER: postgres
          DB_PASSWORD: postgres  # pragma: allowlist secret
          DB_NAME: badge_system_test
          DB_POOL_MIN: '1'
          DB_POOL_MAX: '5'
          JWT_PRIVATE_KEY: ci-placeholder-overridden-by-jest-setup
          JWT_PUBLIC_KEY: ci-placeholder-overridden-by-jest-setup
          CORS_ORIGIN: http://localhost:5173
          DISABLE_AUTH: 'true'
          SEED_TEST_DATA: 'false'
        # The 2026-07-18 post-suite hang (which briefly required --forceExit here)
        # was root-caused to pg-pool never evicting idle clients at/below `min`:
        # with DB_POOL_MIN=1 the shared app pool kept one ref'd idle socket open
        # forever. Fixed at the source via allowExitOnIdle in src/db/pool.js
        # (test env only), so jest exits on its own again and open-handle
        # regressions stay detectable. timeout-minutes above is the safety net.
        run: npm test -- --coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage

  security-check:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: npm audit (fail on high/critical)
        working-directory: ./backend
        run: npm audit --audit-level=high

      - name: Setup Python for detect-secrets
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Scan for hardcoded secrets (detect-secrets)
        run: |
          pip install detect-secrets --quiet
          # Scan for real secrets: high-entropy strings, private keys, AWS keys.
          # KeywordDetector disabled: demo account passwords (pippo01 etc.) are
          # intentional placeholders replaced by bcrypt+DB in the Auth0 migration.
          detect-secrets scan \
            --disable-plugin KeywordDetector \
            --disable-plugin Base64HighEntropyString \
            --exclude-files 'package-lock\.json' \
            --exclude-files '\.git/.*' \
            --exclude-files 'frontend-mobile/node_modules/.*' \
            --exclude-files 'frontend-web/node_modules/.*' \
            --exclude-files 'badge-system/.*' \
            --exclude-files 'backend/\.env\.example' \
            --exclude-files 'backend/scripts/generate-prod-env\.sh' \
            --exclude-files 'docs/.*' \
            --exclude-files 'infrastructure/.*' \
            > /tmp/secrets-scan.json
          COUNT=$(python3 -c "import json; d=json.load(open('/tmp/secrets-scan.json')); print(sum(len(v) for v in d.get('results',{}).values()))")
          if [ "$COUNT" -gt 0 ]; then
            echo "❌ detect-secrets found $COUNT potential secret(s):"
            cat /tmp/secrets-scan.json
            exit 1
          fi
          echo "✅ No hardcoded secrets detected ($COUNT findings)"
